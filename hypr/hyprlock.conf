background {
    monitor =
    path = /home/abooser/Pictures/Wallpapers/wallpaper.jpg
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.9
    brightness = 0.65
    vibrancy = 0.20
    vibrancy_darkness = 0.0
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 0.95)
    font_size = 86
    font_family = JetBrainsMono Nerd Font
    position = 0, 160
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = rgba(220, 220, 235, 0.85)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

image {
    monitor =
    path = /home/abooser/Pictures/avatar.png
    size = 120
    border_size = 3
    border_color = rgba(137, 180, 250, 0.8)
    rounding = -1
    position = 0, -45
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 55
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.25
    dots_center = true

    outer_color = rgba(137, 180, 250, 0.8)
    inner_color = rgba(20, 22, 32, 0.65)
    font_color = rgba(255, 255, 255, 0.95)
    fade_on_empty = false
    placeholder_text = <i>Password...</i>

    rounding = 18
    check_color = rgba(166, 227, 161, 0.8)
    fail_color = rgba(243, 139, 168, 0.8)
    fail_text = <i>Wrong password</i>

    position = 0, -170
    halign = center
    valign = center
}
